# agent-001 runtime settings.
# Paths are relative to the repo root unless absolute.

operator:
  name: your operator
  products: []

openrouter:
  api_url: "https://openrouter.ai/api/v1/chat/completions"
  # Ordered list. Free models are tried first. Paid models are only used when
  # level >= 2 and the free tier returned 429 or unavailable (see PRD section 10).
  models:
    - "meta-llama/llama-3.3-70b-instruct:free"
    - "qwen/qwen3-next-80b-a3b-instruct:free"
    - "meta-llama/llama-3.2-3b-instruct:free"
    - "liquid/lfm-2.5-1.2b-instruct:free"

quota:
  # Hard cap on model calls per wake/day at Level 0 (see addendum section 3).
  daily_call_limit: 10

level_file: "state/level.json"

paths:
  root: "."
  state: "state"
  memory: "memory"
  logs_private: "logs/private"
  logs_public: "logs/public"
  ledger: "ledger"

telegram:
  api_url: "https://api.telegram.org"
  max_messages_per_wake: 10
